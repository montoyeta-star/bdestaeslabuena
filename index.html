<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuestador de Cocinas</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; margin-bottom: 20px; }
        h2 { color: #2c3e50; margin-bottom: 15px; font-size: 1.2rem; }
        .section {
            margin-bottom: 25px;
            padding: 20px;
            background: #fafafa;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #4a5568; }
        select, input, button {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            background-color: #3182ce;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #2b6cb0; }
        .btn-add { background-color: #38a169; margin-top: 22px; }
        .btn-add:hover { background-color: #2f855a; }
        .btn-danger { background-color: #e53e3e; }
        .btn-danger:hover { background-color: #c53030; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #edf2f7; }
        .total-box { text-align: right; font-size: 1.5em; margin-top: 20px; font-weight: bold; }
        .status-bar {
            background-color: #e6f7ff;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-loaded { color: #38a169; font-weight: bold; }
        .status-not-loaded { color: #e53e3e; font-weight: bold; }
        .loading { text-align: center; padding: 30px; color: #3182ce; }
        .row-puerta { background-color: #f0f9ff; font-style: italic; color: #2b6cb0; }
        .row-herraje { background-color: #f0fdf4; font-style: italic; color: #2f855a; }
        .debug-box {
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 15px;
            font-size: 12px;
            font-family: monospace;
            display: none;
        }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🏠 Presupuestador de Cocinas</h1>

    <div class="status-bar no-print">
        <span>📊 Estado:</span>
        <span id="estadoDatos" class="status-not-loaded">Cargando datos...</span>
    </div>

    <div id="loadingMsg" class="loading">⏳ Cargando archivo de productos...</div>

    <div id="presupuestadorSection" style="display: none;">
        <div class="section">
            <h2>📦 1. Añadir Elemento</h2>
            <div class="grid-3">
                <div>
                    <label>📂 Categoría</label>
                    <select id="selectCategoria">
                        <option value="">-- Selecciona --</option>
                    </select>
                </div>
                <div>
                    <label>🎨 Color</label>
                    <select id="selectColor" disabled>
                        <option value="">-- Primero categoría --</option>
                    </select>
                </div>
                <div>
                    <label>📐 Artículo</label>
                    <select id="selectNombre" disabled>
                        <option value="">-- Primero color --</option>
                    </select>
                </div>
            </div>

            <div class="grid-3" style="margin-top: 15px;">
                <div>
                    <label>💰 Precio Unitario (€)</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="number" id="inputPrecio" step="0.01" disabled style="flex: 1;">
                        <button id="btnModificarPrecio" style="width: 50px;">✏️</button>
                    </div>
                </div>
                <div>
                    <label>🔢 Cantidad</label>
                    <input type="number" id="inputCantidad" value="1" min="1">
                </div>
                <div>
                    <button class="btn-add" id="btnAgregar">➕ Añadir</button>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>📋 2. Presupuesto</h2>
            <div style="overflow-x: auto;">
                <table id="tablaPresupuesto">
                    <thead>
                        <tr><th>Categoría</th><th>Color</th><th>Artículo</th><th>Medidas</th><th>Cant.</th><th>P.Unitario</th><th>Total</th><th></th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="total-box">💰 TOTAL: <span id="totalPrecio">0.00</span> €</div>
            <div class="no-print" style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;">
                <button onclick="window.print()" style="width: auto; background-color: #4a5568;">🖨️ Imprimir</button>
                <button id="btnReset" class="btn-danger" style="width: auto;">🗑️ Resetear</button>
            </div>
        </div>
        
        <div id="debugPanel" class="debug-box no-print">
            <strong>🔍 DEPURACIÓN:</strong><br>
            <div id="debugInfo"></div>
        </div>
    </div>
</div>

<script>
    const EXCEL_URL = "https://montoyeta-star.github.io/bdestaeslabuena/modulos.xlsx";
    
    let productosDB = [];
    let puertasDB = [];
    let presupuestoActual = [];
    let articuloSeleccionado = null;

    const estadoDatos = document.getElementById('estadoDatos');
    const loadingMsg = document.getElementById('loadingMsg');
    const presupuestadorSection = document.getElementById('presupuestadorSection');
    const debugInfo = document.getElementById('debugInfo');
    const debugPanel = document.getElementById('debugPanel');
    const selectCategoria = document.getElementById('selectCategoria');
    const selectColor = document.getElementById('selectColor');
    const selectNombre = document.getElementById('selectNombre');
    const inputPrecio = document.getElementById('inputPrecio');
    const inputCantidad = document.getElementById('inputCantidad');
    const btnModificarPrecio = document.getElementById('btnModificarPrecio');
    const btnAgregar = document.getElementById('btnAgregar');
    const btnReset = document.getElementById('btnReset');
    const tablaPresupuesto = document.getElementById('tablaPresupuesto').querySelector('tbody');
    const totalSpan = document.getElementById('totalPrecio');

    function addDebug(msg) {
        debugPanel.style.display = 'block';
        debugInfo.innerHTML += new Date().toLocaleTimeString() + ': ' + msg + '<br>';
        console.log(msg);
    }

    // ============================================================
    // FUNCIÓN PARA DETECTAR SI ES MÓDULO ALTO (lleva colgador)
    // ============================================================
    function esModuloAlto(modulo) {
        const nombreModulo = modulo.nombre.toUpperCase();
        const categoria = modulo.categoria.toUpperCase();
        
        // Detectar si es alto por nombre o categoría
        const esAlto = nombreModulo.includes('ALTO') || categoria.includes('ALTO');
        
        addDebug(`🔍 ¿Es alto? ${modulo.nombre} → ${esAlto ? 'SÍ (lleva colgador)' : 'NO'}`);
        return esAlto;
    }

    // ============================================================
    // FUNCIÓN PARA PATAS (SOLO BAJOS)
    // ============================================================
    function agregarPatas(modulo, cantidad) {
        const nombreModulo = modulo.nombre.toUpperCase();
        const altura = modulo.alto_mm;
        
        addDebug(`🔍 Analizando módulo: "${nombreModulo}" | Altura: ${altura}mm`);
        
        // SOLO para módulos BAJOS (NO altos)
        if (esModuloAlto(modulo)) {
            addDebug(`❌ Es módulo ALTO → NO lleva patas`);
            return null;
        }
        
        // Lista de módulos bajos que llevan patas
        const llevaPatasSiContiene = [
            'BAJOS ALMACENAJE',
            'BAJOS_FREGADERO',
            'BAJO RINCON L',
            'ESCOBERO',
            'BAJO HORNO'
        ];
        
        let llevaPatas = false;
        for (let palabra of llevaPatasSiContiene) {
            if (nombreModulo.includes(palabra.toUpperCase())) {
                llevaPatas = true;
                addDebug(`✅ Coincide con: "${palabra}" → LLEVA PATAS`);
                break;
            }
        }
        
        if (!llevaPatas) {
            addDebug(`❌ NO lleva patas (no coincide con palabras clave de bajos)`);
            return null;
        }
        
        let nombrePata = '';
        let precioPata = 0;
        
        if (altura === 700) {
            nombrePata = 'PATA_H15';
            precioPata = 1.00;
            addDebug(`📌 Altura 700mm → Usar ${nombrePata} (${precioPata}€/unidad)`);
        } else if (altura === 800) {
            nombrePata = 'PATA_H10';
            precioPata = 1.88;
            addDebug(`📌 Altura 800mm → Usar ${nombrePata} (${precioPata}€/unidad)`);
        } else {
            addDebug(`⚠️ Altura ${altura}mm no es 700 ni 800 → NO se añaden patas`);
            return null;
        }
        
        const totalPatas = 4 * cantidad;
        addDebug(`📊 AÑADIENDO: ${totalPatas} x ${nombrePata} = ${(totalPatas * precioPata).toFixed(2)}€`);
        
        return {
            nombre: nombrePata,
            cantidad: totalPatas,
            precioUnitario: precioPata,
            total: totalPatas * precioPata
        };
    }

    // ============================================================
    // FUNCIÓN PARA COLGADOR (SOLO ALTOS)
    // ============================================================
    function agregarColgador(modulo, cantidad) {
        if (!esModuloAlto(modulo)) {
            return null;
        }
        
        const precioColgador = 4.99;
        const totalColgadores = cantidad; // 1 colgador por módulo alto
        
        addDebug(`📌 AÑADIENDO COLGADOR: ${totalColgadores} x Colgador = ${(totalColgadores * precioColgador).toFixed(2)}€`);
        
        return {
            nombre: 'Colgador',
            cantidad: totalColgadores,
            precioUnitario: precioColgador,
            total: totalColgadores * precioColgador
        };
    }

    function calcularPuertas(modulo) {
        const ancho = modulo.ancho_mm;
        const alto = modulo.alto_mm;
        const nombreModulo = modulo.nombre.toUpperCase();
        
        let numPuertas = 1;
        let anchoPuerta = ancho - 3;
        let altoPuerta = alto - 3;
        
        if (nombreModulo.includes('ESCOBERO')) {
            numPuertas = 2;
            anchoPuerta = ancho - 3;
            altoPuerta = 1098;
        } else if (ancho > 600) {
            numPuertas = 2;
            anchoPuerta = (ancho / 2) - 3;
        }
        
        let precioPuerta = 0;
        let nombrePuerta = `Puerta ${Math.round(anchoPuerta)}x${Math.round(altoPuerta)} mm`;
        
        for (let p of puertasDB) {
            if (Math.abs(p.ancho_mm - anchoPuerta) <= 3 && Math.abs(p.alto_mm - altoPuerta) <= 3) {
                precioPuerta = p.precio_venta;
                nombrePuerta = p.nombre;
                break;
            }
        }
        
        return { numPuertas, anchoPuerta: Math.round(anchoPuerta), altoPuerta: Math.round(altoPuerta), precioPuerta, nombrePuerta };
    }

    async function cargarExcel() {
        try {
            estadoDatos.innerHTML = '📖 Leyendo...';
            loadingMsg.style.display = 'block';
            
            const response = await fetch(EXCEL_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const buffer = await response.arrayBuffer();
            const workbook = XLSX.read(buffer, { type: 'array' });
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            
            productosDB = [];
            puertasDB = [];
            
            for (let item of json) {
                let tipo = '';
                for (let key in item) {
                    const v = String(item[key] || '').toUpperCase();
                    if (v === 'MODULO') { tipo = 'MODULO'; break; }
                    if (v === 'PUERTA') { tipo = 'PUERTA'; break; }
                }
                if (!tipo) continue;
                
                let precio = 0;
                for (let key in item) {
                    if (key.toLowerCase().includes('precio_venta')) {
                        precio = parseFloat(item[key]) || 0;
                        break;
                    }
                }
                
                let ancho = 0, alto = 0, fondo = 0;
                for (let key in item) {
                    const k = key.toLowerCase();
                    if (k === 'ancho_cm') ancho = parseFloat(item[key]) || 0;
                    if (k === 'alto_cm') alto = parseFloat(item[key]) || 0;
                    if (k === 'fondo_cm') fondo = parseFloat(item[key]) || 0;
                }
                
                let categoria = '', nombre = '', color = 'BLANCO';
                for (let key in item) {
                    const k = key.toLowerCase();
                    if (k === 'categoria') categoria = String(item[key] || '').trim();
                    if (k === 'nombre') nombre = String(item[key] || '').trim();
                    if (k === 'color_acabado') color = String(item[key] || 'BLANCO').trim().toUpperCase();
                }
                
                const obj = { tipo, categoria, color, nombre, alto_mm: alto, ancho_mm: ancho, fondo_mm: fondo, precio_venta: precio };
                if (tipo === 'MODULO' && categoria && nombre) productosDB.push(obj);
                if (tipo === 'PUERTA' && ancho > 0 && alto > 0) puertasDB.push(obj);
            }
            
            if (productosDB.length === 0) throw new Error('No hay módulos');
            
            estadoDatos.innerHTML = `✅ ${productosDB.length} módulos | ${puertasDB.length} puertas`;
            estadoDatos.className = 'status-loaded';
            loadingMsg.style.display = 'none';
            presupuestadorSection.style.display = 'block';
            
            cargarCategorias();
            
        } catch (err) {
            estadoDatos.innerHTML = `❌ Error: ${err.message}`;
            loadingMsg.innerHTML = `Error: ${err.message}`;
        }
    }

    function cargarCategorias() {
        const cats = [...new Set(productosDB.map(p => p.categoria))];
        selectCategoria.innerHTML = '<option value="">-- Selecciona --</option>';
        cats.forEach(c => selectCategoria.innerHTML += `<option value="${c}">${c}</option>`);
        selectCategoria.disabled = false;
        resetSelects();
    }

    function resetSelects() {
        selectColor.innerHTML = '<option value="">-- Primero categoría --</option>';
        selectColor.disabled = true;
        selectNombre.innerHTML = '<option value="">-- Primero color --</option>';
        selectNombre.disabled = true;
        inputPrecio.value = '';
        inputPrecio.disabled = true;
        articuloSeleccionado = null;
    }

    selectCategoria.addEventListener('change', () => {
        const cat = selectCategoria.value;
        if (!cat) { resetSelects(); return; }
        
        const colores = [...new Set(productosDB.filter(p => p.categoria === cat).map(p => p.color))];
        selectColor.innerHTML = '<option value="">-- Selecciona Color --</option>';
        colores.forEach(c => selectColor.innerHTML += `<option value="${c}">${c}</option>`);
        selectColor.disabled = false;
        selectNombre.innerHTML = '<option value="">-- Primero color --</option>';
        selectNombre.disabled = true;
    });

    selectColor.addEventListener('change', () => {
        const cat = selectCategoria.value, col = selectColor.value;
        if (!cat || !col) { selectNombre.disabled = true; return; }
        
        const items = productosDB.filter(p => p.categoria === cat && p.color === col);
        selectNombre.innerHTML = '<option value="">-- Selecciona --</option>';
        items.forEach(i => {
            selectNombre.innerHTML += `<option value="${i.nombre}" data-alto="${i.alto_mm}" data-ancho="${i.ancho_mm}">
                ${i.nombre} (${i.ancho_mm}×${i.alto_mm} mm) - ${i.precio_venta.toFixed(2)}€
            </option>`;
        });
        selectNombre.disabled = false;
    });

    selectNombre.addEventListener('change', () => {
        const cat = selectCategoria.value, col = selectColor.value, nom = selectNombre.value;
        const opt = selectNombre.options[selectNombre.selectedIndex];
        if (!nom) { articuloSeleccionado = null; return; }
        
        articuloSeleccionado = productosDB.find(p => p.categoria === cat && p.color === col && p.nombre === nom);
        if (articuloSeleccionado && opt) {
            articuloSeleccionado.alto_mm = parseInt(opt.dataset.alto) || articuloSeleccionado.alto_mm;
            articuloSeleccionado.ancho_mm = parseInt(opt.dataset.ancho) || articuloSeleccionado.ancho_mm;
            inputPrecio.value = articuloSeleccionado.precio_venta;
            inputPrecio.disabled = false;
        }
    });

    btnModificarPrecio.addEventListener('click', () => {
        if (articuloSeleccionado) {
            const np = parseFloat(inputPrecio.value);
            if (!isNaN(np) && np >= 0) {
                articuloSeleccionado.precio_venta = np;
                alert('✅ Precio modificado');
            }
        }
    });

    btnAgregar.addEventListener('click', () => {
        if (!articuloSeleccionado) { alert('❌ Selecciona un artículo'); return; }
        
        const cantidad = parseInt(inputCantidad.value);
        if (isNaN(cantidad) || cantidad <= 0) return;
        
        addDebug(`\n=== NUEVO ELEMENTO: ${cantidad} x ${articuloSeleccionado.nombre} ===`);
        
        // Módulo
        presupuestoActual.push({
            categoria: articuloSeleccionado.categoria,
            color: articuloSeleccionado.color,
            nombre: articuloSeleccionado.nombre,
            medida: `${articuloSeleccionado.ancho_mm}×${articuloSeleccionado.alto_mm} mm`,
            cantidad: cantidad,
            precioUnitario: articuloSeleccionado.precio_venta,
            total: cantidad * articuloSeleccionado.precio_venta,
            tipo: 'modulo'
        });
        
        // Puertas
        const puerta = calcularPuertas(articuloSeleccionado);
        const totalPuertas = puerta.numPuertas * cantidad;
        if (totalPuertas > 0 && puerta.precioPuerta > 0) {
            presupuestoActual.push({
                categoria: "🚪 PUERTAS",
                color: articuloSeleccionado.color,
                nombre: puerta.nombrePuerta,
                medida: `${puerta.anchoPuerta}×${puerta.altoPuerta} mm`,
                cantidad: totalPuertas,
                precioUnitario: puerta.precioPuerta,
                total: totalPuertas * puerta.precioPuerta,
                tipo: 'puerta'
            });
        }
        
        // PATAS (solo para módulos BAJOS)
        const patas = agregarPatas(articuloSeleccionado, cantidad);
        if (patas) {
            addDebug(`✅ AÑADIENDO PATAS: ${patas.cantidad} x ${patas.nombre}`);
            presupuestoActual.push({
                categoria: "🔩 HERRAJES",
                color: '',
                nombre: patas.nombre + " (4 patas/módulo)",
                medida: patas.nombre,
                cantidad: patas.cantidad,
                precioUnitario: patas.precioUnitario,
                total: patas.total,
                tipo: 'herraje'
            });
        } else {
            addDebug(`⚠️ NO SE AÑADIERON PATAS`);
        }
        
        // COLGADOR (solo para módulos ALTOS)
        const colgador = agregarColgador(articuloSeleccionado, cantidad);
        if (colgador) {
            addDebug(`✅ AÑADIENDO COLGADOR: ${colgador.cantidad} x ${colgador.nombre}`);
            presupuestoActual.push({
                categoria: "🔩 HERRAJES",
                color: '',
                nombre: colgador.nombre,
                medida: "1 por módulo",
                cantidad: colgador.cantidad,
                precioUnitario: colgador.precioUnitario,
                total: colgador.total,
                tipo: 'herraje'
            });
        }
        
        actualizarTabla();
        inputCantidad.value = 1;
    });

    btnReset.addEventListener('click', () => {
        if (confirm('¿Resetear todo?')) {
            presupuestoActual = [];
            actualizarTabla();
            addDebug('Presupuesto resetado');
        }
    });

    function actualizarTabla() {
        tablaPresupuesto.innerHTML = '';
        let total = 0;
        
        presupuestoActual.forEach((item, idx) => {
            total += item.total;
            let clase = '';
            if (item.tipo === 'puerta') clase = 'row-puerta';
            if (item.tipo === 'herraje') clase = 'row-herraje';
            
            tablaPresupuesto.innerHTML += `
                <tr class="${clase}">
                    <td>${item.categoria}</td>
                    <td>${item.color || '-'}</td>
                    <td>${item.nombre}</td>
                    <td>${item.medida}</td>
                    <td>${item.cantidad}</td>
                    <td>${item.precioUnitario.toFixed(2)}€</td>
                    <td><b>${item.total.toFixed(2)}€</b></td>
                    <td><button onclick="eliminarElemento(${idx})" style="background:#e53e3e; padding:5px 8px; width:auto;">🗑️</button></td>
                </tr>
            `;
        });
        
        totalSpan.innerText = total.toFixed(2);
    }

    window.eliminarElemento = (idx) => {
        presupuestoActual.splice(idx, 1);
        actualizarTabla();
    };

    cargarExcel();
</script>
</body>
</html>
