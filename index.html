<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Presupuestador Cocinas - Tamesis/Cloe | Lateral Rojo</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            background: #eef2f5;
            min-height: 100vh;
            padding: 20px 24px;
        }

        /* Layout dos columnas */
        .dashboard {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            gap: 24px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        /* COLUMNA LATERAL: SIN ESQUINAS REDONDEADAS, FONDO ROJO, COMPACTO EXTREMO */
        .sidebar-form {
            flex: 1.2;
            min-width: 300px;
            background: #b91c1c;
            border: none;
            border-radius: 0px !important;
            padding: 14px 16px;
            position: sticky;
            top: 20px;
            box-shadow: 4px 0 12px rgba(0, 0, 0, 0.05);
        }

        /* Compactación total */
        .sidebar-form * {
            font-size: 0.7rem;
            line-height: 1.2;
        }

        .sidebar-form h2 {
            font-size: 0.85rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
            border-left: 3px solid #ffd966;
            padding-left: 10px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .sidebar-form label {
            font-weight: 600;
            display: block;
            margin-bottom: 3px;
            color: #ffe6e6;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        .sidebar-form select,
        .sidebar-form input {
            width: 100%;
            padding: 5px 8px;
            border: 1px solid #a31616;
            border-radius: 0px !important;
            font-size: 0.68rem;
            background: #fff3e8;
            color: #1a1a1a;
        }

        .modelo-selector, .patas-selector {
            background: #a51c1c;
            padding: 6px 8px;
            margin: 10px 0 8px 0;
            border: 1px solid #c72a2a;
            border-radius: 0px;
        }

        .modelo-label, .patas-label {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .modelo-label label, .patas-label label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            background: #a31b1b;
            border: 1px solid #d14545;
            border-radius: 0px;
            color: white;
            font-size: 0.65rem;
        }

        .precio-row {
            display: flex;
            gap: 8px;
        }
        .precio-row button {
            width: 44px;
            background: #d97706;
            border: none;
            border-radius: 0px;
            font-size: 0.65rem;
        }
        .btn-add-large {
            background: #ca8a04;
            width: 100%;
            padding: 6px 0;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 14px;
            border-radius: 0px;
        }
        .info-text {
            font-size: 0.55rem;
            color: #ffcece;
            margin-top: 4px;
        }

        /* HEADER GLOBAL */
        .global-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            background: white;
            padding: 6px 18px;
            border-bottom: 2px solid #b91c1c;
        }
        h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1e293b;
        }
        .subtitulo {
            font-size: 0.65rem;
            background: #f1f5f9;
            padding: 2px 10px;
            color: #b91c1c;
        }
        .status-badge {
            font-size: 0.65rem;
            margin-left: auto;
            background: #f1f5f9;
            padding: 2px 12px;
        }

        /* PANEL DERECHO: TABLA ULTRACOMPACTA */
        .main-content {
            flex: 2.5;
            min-width: 480px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 14px 18px;
        }
        .main-content h2 {
            font-size: 0.9rem;
            font-weight: 700;
            color: #b91c1c;
            margin-bottom: 8px;
            border-left: 3px solid #b91c1c;
            padding-left: 10px;
        }

        /* TABLA - TEXTO MICRO, MÁRGENES CERO, CELDAS COMPACTAS */
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.62rem;   /* letra aún más pequeña */
            line-height: 1.2;
        }
        th, td {
            padding: 5px 4px !important;   /* reducción drástica vertical/horizontal */
            text-align: left;
            border-bottom: 1px solid #edf2f7;
        }
        th {
            background: #f8fafc;
            font-weight: 700;
            color: #b45309;
            font-size: 0.6rem;
            text-transform: uppercase;
            padding: 4px 4px !important;
        }
        /* Filas de módulos, puertas y herrajes aún más prietas */
        .row-modulo td {
            font-weight: 600;
            background-color: #fffaf5;
            padding: 5px 4px !important;
        }
        .row-puerta td, .row-herraje td {
            font-size: 0.58rem !important;
            padding: 3px 4px !important;
            padding-left: 18px !important;
        }
        .color-encargo {
            color: #e67e22 !important;
            font-weight: 600;
        }
        .total-container {
            margin-top: 14px;
            background: #fef9f0;
            padding: 8px 16px;
            border: 1px solid #fde68a;
        }
        .total-line {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid #f1e0c5;
            font-size: 0.7rem;
        }
        .total-line.grand-total {
            border-top: 2px solid #b91c1c;
            border-bottom: none;
            padding-top: 6px;
            font-weight: 800;
            font-size: 0.8rem;
        }
        .grand-total .total-amount {
            color: #b91c1c;
            font-size: 1rem;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 14px;
        }
        .action-buttons button {
            padding: 4px 16px;
            border-radius: 0px;
            font-size: 0.65rem;
            background: #e2e8f0;
        }
        .btn-danger-clear {
            background: #fee2e2;
            color: #b91c1c;
        }
        .debug-box { display: none; }
        @media (max-width: 800px) {
            body { padding: 12px; }
            .dashboard { flex-direction: column; }
            .sidebar-form { position: relative; top: 0; }
        }
        @media print {
            .sidebar-form, .global-header, .action-buttons, .patas-selector, .modelo-selector, .btn-add-large { display: none; }
        }
    </style>
</head>
<body>
    <div class="global-header no-print">
        <div class="logo-icon" style="display: inline-block;">
            <svg width="28" height="28" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="8" y="12" width="32" height="28" rx="2" stroke="#b91c1c" stroke-width="1.5" fill="#FFF7ED" />
                <line x1="12" y1="20" x2="36" y2="20" stroke="#b91c1c" stroke-width="1.2" stroke-dasharray="2 2" />
                <line x1="12" y1="28" x2="36" y2="28" stroke="#b91c1c" stroke-width="1.2" stroke-dasharray="2 2" />
                <line x1="20" y1="12" x2="20" y2="40" stroke="#b91c1c" stroke-width="1" stroke-dasharray="2 3" />
                <line x1="28" y1="12" x2="28" y2="40" stroke="#b91c1c" stroke-width="1" stroke-dasharray="2 3" />
                <circle cx="24" cy="16" r="2" fill="#b91c1c" fill-opacity="0.6" stroke="#b91c1c" stroke-width="1" />
            </svg>
        </div>
        <h1>Presupuestador Cocinas <span class="subtitulo">Tamesis / Cloe</span></h1>
        <div style="flex:1"></div>
        <span id="estadoDatos" class="status-badge">Cargando...</span>
    </div>

    <div class="dashboard">
        <!-- Lateral izquierdo: rojo, sin bordes redondos, compacto -->
        <div class="sidebar-form no-print">
            <h2>📦 1. Añadir elemento</h2>
            <div class="form-group">
                <label>📂 CATEGORÍA</label>
                <select id="selectCategoria"><option value="">-- Selecciona --</option></select>
            </div>
            <div class="form-group">
                <label>🎨 COLOR / ACABADO</label>
                <select id="selectColor" disabled><option value="">-- Primero categoría --</option></select>
            </div>
            <div class="form-group">
                <label>📐 ARTÍCULO</label>
                <select id="selectNombre" disabled><option value="">-- Primero color --</option></select>
            </div>
            <div class="modelo-selector">
                <label style="color:#ffdd99;">🚪 MODELO PUERTA</label>
                <div class="modelo-label">
                    <label><input type="radio" name="modeloPuerta" value="TAMESIS_COLOR" checked> Tamesis · color a elegir</label>
                    <label><input type="radio" name="modeloPuerta" value="CLOE"> Cloe</label>
                </div>
            </div>
            <div class="form-group">
                <label>💰 PRECIO UNITARIO (€)</label>
                <div class="precio-row">
                    <input type="number" id="inputPrecio" step="0.01" disabled placeholder="Auto">
                    <button id="btnModificarPrecio">✏️</button>
                </div>
            </div>
            <div class="form-group">
                <label>🔢 CANTIDAD</label>
                <input type="number" id="inputCantidad" value="1" min="1">
            </div>
            <div class="patas-selector">
                <label style="color:#ffdd99;">🔩 PATAS</label>
                <div class="patas-label">
                    <label><input type="radio" name="tipoPata" value="PATA_H10" checked> PATA_H10 (4 uds)</label>
                    <label><input type="radio" name="tipoPata" value="PATA_H15"> PATA_H15 (4 uds)</label>
                    <label><input type="radio" name="tipoPata" value="NINGUNA"> ❌ Sin patas</label>
                </div>
                <div class="info-text">ℹ️ ALTOS no llevan patas</div>
            </div>
            <button class="btn-add-large" id="btnAgregar">➕ AÑADIR</button>
        </div>

        <!-- Panel derecho: tabla compacta -->
        <div class="main-content">
            <h2>📋 2. Presupuesto detallado</h2>
            <div class="table-wrapper">
                <table id="tablaPresupuesto">
                    <thead>
                        <tr><th>Categoría</th><th>Color</th><th>Artículo</th><th>Medidas</th><th>Cant.</th><th>P.Unit</th><th>Total</th><th></th></tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="8" style="text-align:center; padding:8px;">Añade módulos desde lateral</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="total-container">
                <div class="total-line"><span>💰 SUBTOTAL</span><span id="subtotalPrecio">0.00 €</span></div>
                <div class="total-line"><span>📊 IVA (21%)</span><span id="ivaPrecio">0.00 €</span></div>
                <div class="total-line grand-total"><span>💵 TOTAL</span><span id="totalConIva">0.00 €</span></div>
            </div>
            <div class="action-buttons">
                <button onclick="window.print()">🖨️ Imprimir</button>
                <button id="btnReset" class="btn-danger-clear">🗑️ Resetear</button>
            </div>
        </div>
    </div>
    <div id="loadingMsg" style="display: none;"></div>

    <script>
        const EXCEL_URL = "https://montoyeta-star.github.io/bdestaeslabuena/modulos.xlsx";
        const IVA_PORCENTAJE = 21;
        let productosDB = [];
        let puertasDB = [];
        let herrajesDB = {};
        let basesDB = {};
        let presupuestoActual = [];
        let articuloSeleccionado = null;

        const estadoDatos = document.getElementById('estadoDatos');
        const loadingMsg = document.getElementById('loadingMsg');
        const selectCategoria = document.getElementById('selectCategoria');
        const selectColor = document.getElementById('selectColor');
        const selectNombre = document.getElementById('selectNombre');
        const inputPrecio = document.getElementById('inputPrecio');
        const inputCantidad = document.getElementById('inputCantidad');
        const btnModificarPrecio = document.getElementById('btnModificarPrecio');
        const btnAgregar = document.getElementById('btnAgregar');
        const btnReset = document.getElementById('btnReset');
        const tablaPresupuesto = document.getElementById('tablaPresupuesto').querySelector('tbody');
        const subtotalSpan = document.getElementById('subtotalPrecio');
        const ivaSpan = document.getElementById('ivaPrecio');
        const totalConIvaSpan = document.getElementById('totalConIva');

        function getModeloPuertaSeleccionado() { const radios = document.getElementsByName('modeloPuerta'); for (let r of radios) if (r.checked) return r.value; return 'TAMESIS_COLOR'; }
        function getTipoPataSeleccionado() { const radios = document.getElementsByName('tipoPata'); for (let r of radios) if (r.checked) return r.value; return 'PATA_H10'; }
        function debeLlevarPatas(modulo) { return modulo.categoria.toUpperCase() !== 'ALTOS'; }
        function agregarPatas(modulo, cantidad, tipoPata) {
            if (tipoPata === 'NINGUNA') return null;
            if (!debeLlevarPatas(modulo)) return null;
            const precioPata = herrajesDB[tipoPata] || 5;
            const totalPatas = 4 * cantidad;
            return { nombre: tipoPata, cantidad: totalPatas, precioUnitario: precioPata, total: totalPatas * precioPata };
        }
        function agregarColgador(modulo, cantidad) {
            if (modulo.categoria.toUpperCase() !== 'ALTOS') return null;
            const precioColgador = herrajesDB['Colgador'] || 5;
            const totalColgadores = cantidad;
            return { nombre: 'Colgador', cantidad: totalColgadores, precioUnitario: precioColgador, total: totalColgadores * precioColgador };
        }
        function calcularBisagras(puertaInfo, cantidadPuertas) {
            const numBisagras = puertaInfo.altoPuerta > 798 ? 3 : 2;
            const totalBisagras = numBisagras * cantidadPuertas;
            if (totalBisagras === 0) return null;
            const precioBisagra = herrajesDB['BISAGRA_SENSYS'] || 0;
            if (precioBisagra <= 0) return null;
            return { nombre: `Bisagra Sensys (${numBisagras}/puerta)`, cantidad: totalBisagras, precioUnitario: precioBisagra, total: totalBisagras * precioBisagra };
        }
        function calcularPuertas(modulo, cantidad, modeloPuerta) {
            let numPuertas = modulo.ancho_mm > 600 ? 2 : 1;
            let anchoPuerta = numPuertas === 2 ? (modulo.ancho_mm / 2) - 3 : modulo.ancho_mm - 3;
            let altoPuerta = modulo.alto_mm - 3;
            if (modulo.nombre.toUpperCase().includes('ESCOBERO')) { numPuertas = 2; altoPuerta = 1098; }
            anchoPuerta = Math.round(anchoPuerta); altoPuerta = Math.round(altoPuerta);
            let precioPuerta = 0, nombrePuerta = `Puerta ${modeloPuerta} ${anchoPuerta}x${altoPuerta} mm`;
            for (let p of puertasDB) {
                if ((p.categoria || '').toUpperCase() === modeloPuerta && Math.abs(p.ancho_mm - anchoPuerta) <= 2 && Math.abs(p.alto_mm - altoPuerta) <= 2) {
                    precioPuerta = p.precio_venta; nombrePuerta = p.nombre || nombrePuerta;
                    break;
                }
            }
            return { numPuertas, anchoPuerta, altoPuerta, precioPuerta, nombrePuerta };
        }

        async function cargarExcel() {
            try {
                estadoDatos.innerText = '📖 cargando...';
                loadingMsg.style.display = 'block';
                const response = await fetch(EXCEL_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const buffer = await response.arrayBuffer();
                const workbook = XLSX.read(buffer, { type: 'array' });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                productosDB = []; puertasDB = []; herrajesDB = {}; basesDB = {};
                for (let item of json) {
                    let tipo = '';
                    for (let key in item) { const v = String(item[key] || '').toUpperCase(); if (v === 'MODULO') { tipo = 'MODULO'; break; } if (v === 'PUERTA') { tipo = 'PUERTA'; break; } if (v === 'HERRAJE') { tipo = 'HERRAJE'; break; } if (v === 'BASE') { tipo = 'BASE'; break; } }
                    if (!tipo) continue;
                    let precio = 0;
                    for (let key in item) { const k = key.toLowerCase(); if (k === 'precio_venta') { let val = String(item[key]).replace(',', '.'); precio = parseFloat(val) || 0; break; } }
                    let ancho = 0, alto = 0;
                    for (let key in item) { const k = key.toLowerCase(); if (k === 'ancho_cm') ancho = parseFloat(item[key]) || 0; if (k === 'alto_cm') alto = parseFloat(item[key]) || 0; }
                    let categoria = '', nombre = '', color = '';
                    for (let key in item) { const k = key.toLowerCase(); if (k === 'categoria') categoria = String(item[key] || '').trim().toUpperCase(); if (k === 'nombre') nombre = String(item[key] || '').trim(); if (k === 'color_acabado') color = String(item[key] || '').trim().toUpperCase(); }
                    if (tipo === 'MODULO' && categoria && nombre) {
                        if (categoria === 'CACEROLEROS' && (precio === 0 || isNaN(precio))) precio = 5;
                        productosDB.push({ tipo, categoria, color, nombre, alto_mm: alto, ancho_mm: ancho, precio_venta: precio || 5 });
                    }
                    if (tipo === 'PUERTA' && ancho > 0 && alto > 0) { puertasDB.push({ categoria, nombre, alto_mm: alto, ancho_mm: ancho, precio_venta: precio, color }); }
                    if (tipo === 'HERRAJE' && nombre) { herrajesDB[nombre.toUpperCase()] = precio; }
                    if (tipo === 'BASE' && nombre) { basesDB[nombre.toUpperCase()] = basesDB[nombre.toUpperCase()] || {}; basesDB[nombre.toUpperCase()][ancho] = precio; }
                }
                if (productosDB.length === 0) throw new Error('No hay módulos');
                estadoDatos.innerText = `✅ ${productosDB.length} módulos`;
                estadoDatos.style.background = "#e8f0e8";
                loadingMsg.style.display = 'none';
                cargarCategorias();
            } catch (err) {
                estadoDatos.innerText = `❌ ${err.message}`;
                loadingMsg.innerText = `Error: ${err.message}`;
                console.error(err);
            }
        }

        function cargarCategorias() {
            const cats = [...new Set(productosDB.map(p => p.categoria))];
            selectCategoria.innerHTML = '<option value="">-- Selecciona --</option>';
            cats.forEach(c => selectCategoria.innerHTML += `<option value="${c}">${c}</option>`);
            selectCategoria.disabled = false;
            resetSelects();
        }
        function resetSelects() { selectColor.innerHTML = '<option value="">-- Primero categoría --</option>'; selectColor.disabled = true; selectNombre.innerHTML = '<option value="">-- Primero color --</option>'; selectNombre.disabled = true; inputPrecio.value = ''; inputPrecio.disabled = true; articuloSeleccionado = null; }
        selectCategoria.addEventListener('change', () => {
            const cat = selectCategoria.value;
            if (!cat) { resetSelects(); return; }
            const colores = [...new Set(productosDB.filter(p => p.categoria === cat).map(p => p.color))];
            selectColor.innerHTML = '<option value="">-- Selecciona Color/Acabado --</option>';
            colores.forEach(c => selectColor.innerHTML += `<option value="${c}">${c}</option>`);
            selectColor.disabled = false;
            selectNombre.innerHTML = '<option value="">-- Primero color --</option>';
            selectNombre.disabled = true;
        });
        selectColor.addEventListener('change', () => {
            const cat = selectCategoria.value, col = selectColor.value;
            if (!cat || !col) { selectNombre.disabled = true; return; }
            const items = productosDB.filter(p => p.categoria === cat && p.color === col);
            selectNombre.innerHTML = '<option value="">-- Selecciona --</option>';
            items.forEach(i => { selectNombre.innerHTML += `<option value="${i.nombre}" data-alto="${i.alto_mm}" data-ancho="${i.ancho_mm}" data-precio="${i.precio_venta}">${i.nombre} (${i.ancho_mm}×${i.alto_mm} mm) - ${i.precio_venta.toFixed(2)}€</option>`; });
            selectNombre.disabled = false;
        });
        selectNombre.addEventListener('change', () => {
            const cat = selectCategoria.value, col = selectColor.value, nom = selectNombre.value;
            const opt = selectNombre.options[selectNombre.selectedIndex];
            if (!nom) { articuloSeleccionado = null; return; }
            articuloSeleccionado = productosDB.find(p => p.categoria === cat && p.color === col && p.nombre === nom);
            if (articuloSeleccionado && opt) { articuloSeleccionado.alto_mm = parseInt(opt.dataset.alto) || articuloSeleccionado.alto_mm; articuloSeleccionado.ancho_mm = parseInt(opt.dataset.ancho) || articuloSeleccionado.ancho_mm; articuloSeleccionado.precio_venta = parseFloat(opt.dataset.precio) || articuloSeleccionado.precio_venta; inputPrecio.value = articuloSeleccionado.precio_venta; inputPrecio.disabled = false; }
        });
        btnModificarPrecio.addEventListener('click', () => { if (articuloSeleccionado) { const np = parseFloat(inputPrecio.value); if (!isNaN(np) && np >= 0) { articuloSeleccionado.precio_venta = np; alert('✅ Precio modificado'); } } });

        btnAgregar.addEventListener('click', () => {
            if (!articuloSeleccionado) { alert('❌ Selecciona artículo'); return; }
            const cantidad = parseInt(inputCantidad.value);
            if (isNaN(cantidad) || cantidad <= 0) return;
            const modeloPuerta = getModeloPuertaSeleccionado();
            const tipoPata = getTipoPataSeleccionado();
            const esCacerolero = articuloSeleccionado.categoria === "CACEROLEROS";

            presupuestoActual.push({
                categoria: articuloSeleccionado.categoria,
                color: articuloSeleccionado.color,
                nombre: articuloSeleccionado.nombre,
                medida: `${articuloSeleccionado.ancho_mm}×${articuloSeleccionado.alto_mm} mm`,
                cantidad: cantidad,
                precioUnitario: articuloSeleccionado.precio_venta,
                total: cantidad * articuloSeleccionado.precio_venta,
                tipo: 'modulo'
            });

            if (esCacerolero) {
                const altoModulo = articuloSeleccionado.alto_mm;
                let altoPuerta = (altoModulo / 2) - 2;
                const anchoPuerta = articuloSeleccionado.ancho_mm - 3;
                const totalPuertas = 2 * cantidad;
                let precioPuerta = 0, nombrePuerta = `Puerta ${modeloPuerta} ${Math.round(anchoPuerta)}x${Math.round(altoPuerta)} mm`;
                for (let p of puertasDB) if ((p.categoria || '').toUpperCase() === modeloPuerta && Math.abs(p.ancho_mm - anchoPuerta) <= 2 && Math.abs(p.alto_mm - altoPuerta) <= 2) { precioPuerta = p.precio_venta; nombrePuerta = p.nombre || nombrePuerta; break; }
                if (precioPuerta === 0) precioPuerta = 15;
                if (totalPuertas > 0 && precioPuerta > 0) presupuestoActual.push({ categoria: `🚪 PUERTAS (${modeloPuerta === 'TAMESIS_COLOR' ? 'TAMESIS' : modeloPuerta})`, color: modeloPuerta === 'TAMESIS_COLOR' ? '🎨 A ELEGIR, DE ENCARGO' : articuloSeleccionado.color, nombre: nombrePuerta, medida: `${Math.round(anchoPuerta)}×${Math.round(altoPuerta)} mm`, cantidad: totalPuertas, precioUnitario: precioPuerta, total: totalPuertas * precioPuerta, tipo: 'puerta' });
                const totalCaceroleros = 2 * cantidad; const precioHerraje = herrajesDB['CACEROLERO'] || 50; if (precioHerraje > 0) presupuestoActual.push({ categoria: "🔩 HERRAJES", color: '', nombre: "CACEROLERO (herraje)", medida: "por cacerolero", cantidad: totalCaceroleros, precioUnitario: precioHerraje, total: totalCaceroleros * precioHerraje, tipo: 'herraje' });
                let precioBase = 9; if (basesDB['CACEROLERO'] && basesDB['CACEROLERO'][articuloSeleccionado.ancho_mm]) precioBase = basesDB['CACEROLERO'][articuloSeleccionado.ancho_mm];
                presupuestoActual.push({ categoria: "🔩 HERRAJES", color: '', nombre: `BASE CACEROLERO (ancho ${articuloSeleccionado.ancho_mm} mm)`, medida: "2 por módulo", cantidad: totalCaceroleros, precioUnitario: precioBase, total: totalCaceroleros * precioBase, tipo: 'herraje' });
                const patas = agregarPatas(articuloSeleccionado, cantidad, tipoPata); if (patas) presupuestoActual.push({ categoria: "🔩 HERRAJES", color: '', nombre: `${patas.nombre} (4 patas/módulo)`, medida: patas.nombre, cantidad: patas.cantidad, precioUnitario: patas.precioUnitario, total: patas.total, tipo: 'herraje' });
            } else {
                const puerta = calcularPuertas(articuloSeleccionado, cantidad, modeloPuerta);
                const totalPuertas = puerta.numPuertas * cantidad;
                const colorDisplay = modeloPuerta === 'TAMESIS_COLOR' ? '🎨 A ELEGIR, DE ENCARGO' : (articuloSeleccionado.color || '');
                if (totalPuertas > 0 && puerta.precioPuerta > 0) presupuestoActual.push({ categoria: `🚪 PUERTAS (${modeloPuerta === 'TAMESIS_COLOR' ? 'TAMESIS' : modeloPuerta})`, color: colorDisplay, nombre: puerta.nombrePuerta, medida: `${puerta.anchoPuerta}×${puerta.altoPuerta} mm`, cantidad: totalPuertas, precioUnitario: puerta.precioPuerta, total: totalPuertas * puerta.precioPuerta, tipo: 'puerta' });
                const bisagras = calcularBisagras(puerta, totalPuertas); if (bisagras && bisagras.cantidad > 0 && bisagras.precioUnitario > 0) presupuestoActual.push({ categoria: "🔩 HERRAJES", color: '', nombre: bisagras.nombre, medida: "Bisagra Sensys", cantidad: bisagras.cantidad, precioUnitario: bisagras.precioUnitario, total: bisagras.total, tipo: 'herraje' });
                const patas = agregarPatas(articuloSeleccionado, cantidad, tipoPata); if (patas) presupuestoActual.push({ categoria: "🔩 HERRAJES", color: '', nombre: `${patas.nombre} (4 patas/módulo)`, medida: patas.nombre, cantidad: patas.cantidad, precioUnitario: patas.precioUnitario, total: patas.total, tipo: 'herraje' });
                const colgador = agregarColgador(articuloSeleccionado, cantidad); if (colgador) presupuestoActual.push({ categoria: "🔩 HERRAJES", color: '', nombre: colgador.nombre, medida: "1 por módulo", cantidad: colgador.cantidad, precioUnitario: colgador.precioUnitario, total: colgador.total, tipo: 'herraje' });
            }
            actualizarTabla();
            inputCantidad.value = 1;
        });

        btnReset.addEventListener('click', () => { if (confirm('¿Resetear presupuesto?')) { presupuestoActual = []; actualizarTabla(); } });

        function actualizarTabla() {
            tablaPresupuesto.innerHTML = '';
            let subtotal = 0;
            presupuestoActual.forEach((item, idx) => {
                subtotal += item.total;
                let clase = item.tipo === 'modulo' ? 'row-modulo' : (item.tipo === 'puerta' ? 'row-puerta' : 'row-herraje');
                let colorClass = item.color === '🎨 A ELEGIR, DE ENCARGO' ? 'color-encargo' : '';
                tablaPresupuesto.innerHTML += `<tr class="${clase} ${colorClass}">
                    <td>${item.categoria}</td><td style="font-size:0.58rem;">${item.color || '-'}</td>
                    <td>${item.nombre}</td><td style="font-size:0.58rem;">${item.medida}</td>
                    <td>${item.cantidad}</td><td>${item.precioUnitario.toFixed(2)}€</td>
                    <td><b>${item.total.toFixed(2)}€</b></td>
                    <td><button onclick="eliminarElemento(${idx})" style="background:#e2e8f0; border:none; padding:2px 7px; font-size:0.6rem; cursor:pointer;">🗑️</button></td>
                 </tr>`;
            });
            if (presupuestoActual.length === 0) tablaPresupuesto.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:6px;">Añade módulos desde el panel lateral</td></tr>';
            const iva = subtotal * (IVA_PORCENTAJE / 100);
            subtotalSpan.innerText = subtotal.toFixed(2) + ' €';
            ivaSpan.innerText = iva.toFixed(2) + ' €';
            totalConIvaSpan.innerText = (subtotal + iva).toFixed(2) + ' €';
        }
        window.eliminarElemento = (idx) => { presupuestoActual.splice(idx, 1); actualizarTabla(); };
        cargarExcel();
    </script>
</body>
</html>
